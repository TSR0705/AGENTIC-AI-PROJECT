name: Continuous Integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-workspace:
    name: Lint, Test, & Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
            backend/package-lock.json

      - name: Install Workspace Dependencies
        run: npm install --prefer-offline --no-audit
        continue-on-error: true

      - name: Run Workspace Format & Lint Check
        run: |
          npm run format:check || true
          npm run lint || true

      - name: Install Frontend Dependencies
        run: npm install --prefix frontend

      - name: Validate Frontend Production Build
        run: npm run build --prefix frontend

      - name: Install Backend Dependencies
        run: npm install --prefix backend

      - name: Execute Backend Vitest Suite
        run: npm run test --prefix backend
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://127.0.0.1:27017/test-db
          JWT_SECRET: test_super_secret_ci_key
          GOOGLE_AI_KEY: test-google-ai-key-for-ci
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
