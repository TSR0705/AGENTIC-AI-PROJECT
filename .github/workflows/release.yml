name: Automated Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  tag-release:
    name: Generate Semantic Version & Release Tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Check Commit Messages with Conventional Commits
        run: |
          npx commitlint --from=HEAD~1 --to=HEAD || echo "Skipping commit message verification for merge commits."

      - name: Create Release Tag
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
