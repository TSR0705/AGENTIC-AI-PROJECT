version: '3.8'

services:
  mongo:
    image: mongo:8.0-noble
    container_name: whisper-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - sandbox-network

  redis:
    image: redis:7.4-alpine
    container_name: whisper-redis
    ports:
      - "6379:6379"
    networks:
      - sandbox-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: whisper-backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGODB_URI=mongodb://mongo:27017/whisper-sandbox
      - JWT_SECRET=compose_jwt_secret_phrase_here
      - GOOGLE_AI_KEY=your_gemini_api_key_here
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - mongo
      - redis
    networks:
      - sandbox-network

networks:
  sandbox-network:
    driver: bridge

volumes:
  mongo-data:
    driver: local
